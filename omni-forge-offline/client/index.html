<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omni Forge</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- License gate (shown until activated) -->
  <div id="licenseGate" class="license-gate hidden">
    <div class="lg-card">
      <div class="lg-brand">
        <div class="lg-mark">⚡</div>
        <div class="lg-text">
          <h1>Omni Forge</h1>
          <p>by Nitzex Visual</p>
        </div>
      </div>
      <h2>Activate Your License</h2>
      <p class="lg-sub">Enter your license key to unlock the full suite. Activation works fully offline — no internet required.</p>
      <input id="licenseKeyInput" type="text" class="lg-input" placeholder="OMNI-XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false">
      <button id="activateBtn" class="lg-btn primary">Activate</button>
      <div id="licenseStatus" class="lg-status"></div>
      <div class="lg-foot">
        <span>Need a key?</span>
        <a href="#" data-link="https://www.instagram.com/nitzexvisual">Contact Nitzex Visual</a>
      </div>
    </div>
  </div>

  <!-- Main app shell -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">⚡</span>
        <span class="brand-title">Omni Forge</span>
        <span class="brand-by">by Nitzex Visual</span>
      </div>
      <button id="menuBtn" class="icon-btn" title="Menu">≡</button>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="home">Home</button>
      <button class="tab" data-tab="forge">Forge</button>
      <button class="tab" data-tab="curveset">Curveset</button>
      <button class="tab" data-tab="typecast">Typecast</button>
      <button class="tab" data-tab="fxcore">FX Core</button>
      <button class="tab" data-tab="vault">Vault</button>
      <button class="tab" data-tab="kinetic">Kinetic</button>
      <button class="tab" data-tab="studio">Studio</button>
    </nav>

    <main id="content" class="content"></main>

    <div id="toastHost" class="toast-host"></div>
    <div id="modalHost" class="modal-host hidden"></div>
  </div>

  <script src="../lib/CSInterface.js"></script>
  <script src="js/bridge.js"></script>
  <script src="js/keyhashes.js"></script>
  <script src="js/license.js"></script>
  <script src="js/router.js"></script>
  <script src="js/tabs/home.js"></script>
  <script src="js/tabs/forge.js"></script>
  <script src="js/tabs/curveset.js"></script>
  <script src="js/tabs/typecast.js"></script>
  <script src="js/tabs/fxcore.js"></script>
  <script src="js/tabs/vault.js"></script>
  <script src="js/tabs/kinetic.js"></script>
  <script src="js/tabs/studio.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
